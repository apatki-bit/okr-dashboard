      {lyftObj:"Power Platform: RTB",priority:"Empower with People Data",initiative:"Conduct Quarterly Org Health Checks",func:"PBP",plt:"Sr. Director, PBP (TBH)",eplt:"Carl Reyes",goal:"Conduct regular, comprehensive health assessments across orgs.",annualKR:"Increase monthly unique user count of Dashboards by 30% and achieve 90% leader consumption.",q1KR:"Deploy the first iteration of the Quarterly Org Health Checks to all PDT leaders.",q1Jan:"Yellow",q1Feb:"",q1Mar:"",q1Note:"Pilots completed in January for 3 groups. Tracking toward Q2 launch. Tableau > ThoughtSpot migration in H2.",q2KR:"Integrate 2 critical data sets into the dashboards.",q3KR:"Finalize the people analytics platform and reduce average time to generate a custom report by 15%.",q4KR:"Increase the monthly unique user count of People Analytics Dashboards by 30%."},
      {lyftObj:"Power Platform: RTB",priority:"Empower with People Data",initiative:"TA Dashboards",func:"Talent",plt:"Quincy Amekuedi",eplt:"Hannah Rose",goal:"Develop and maintain Talent Acquisition dashboards to empower leaders with accurate reporting.",annualKR:"Achieve 100% adoption rate for TA leaders and utilize dashboards to inform 3 strategic Q1 2027 hiring decisions.",q1KR:"Revamp current-state Talent dashboards by auditing and consolidating existing views.",q1Jan:"Green",q1Feb:"Green",q1Mar:"",q1Note:"Consolidated TA metrics and finalized definitions. On track to begin building new dashboards in ThoughtSpot.",q2KR:"Build the required dashboards in ThoughtSpot in collaboration with the People Analytics team.",q3KR:"Launch the new Talent dashboards in ThoughtSpot with validated metrics.",q4KR:"TA Dashboards utilized to inform 3 strategic Q1 2027 hiring decisions."},
    ];

    function parseCSV(text) {
      const lines = text.trim().split("\n");
      if (lines.length < 2) return null;
      const headers = lines[0].split(",").map(h => h.replace(/^"|"$/g,"").trim());
      return lines.slice(1).map(line => {
        const cols = [];
        let cur = "", inQ = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"') { inQ = !inQ; }
          else if (ch === ',' && !inQ) { cols.push(cur); cur = ""; }
          else { cur += ch; }
        }
        cols.push(cur);
        const obj = {};
        headers.forEach((h, i) => { obj[h] = (cols[i]||"").replace(/^"|"$/g,"").trim(); });
        return obj;
      }).filter(r => Object.values(r).some(v => v));
    }

    function mapCSVToData(parsed) {
      return parsed.map(r => ({
        lyftObj:  r["2026 Lyft Objective + Priority"] || "",
        priority: r["People Team Priority"] || "",
        initiative: r["People Team Initiative"] || "",
        func:     r["Functional Ownership"] || "",
        plt:      r["PLT Driver"] || "",
        eplt:     r["EPLT Driver"] || "",
        goal:     r["Initiative Goal"] || "",
        annualKR: r["Key Result (Annual)"] || "",
        q1KR:     r["Q1 Key Result (KR)"] || "",
        q1Jan:    r["Status"] || "",
        q1Feb:    r["Status_2"] || "",
        q1Mar:    r["Status_3"] || "",
        q1Note:   r["February Status Narrative (Why is it G, Y or R?)"] || r["January Status Narrative (Why is it G, Y or R?)"] || "",
        q2KR:     r["Q2 Key Result (KR)"] || "",
        q3KR:     r["Q3 Key Result (KR)"] || "",
        q4KR:     r["Q4 Key Result (KR)"] || "",
      })).filter(r => r.initiative);
    }

    const STATUS_STYLES = {
      Green:  { bg:"#eaf4f1", text:"#2d6a4f", border:"#a8d5cc", dot:"#2d6a4f", label:"On Track" },
      Yellow: { bg:"#fff8ec", text:"#a06000", border:"#f5d9a0", dot:"#e6a817", label:"At Risk" },
      Red:    { bg:"#fdf0ee", text:"#c0392b", border:"#f5b8b0", dot:"#c0392b", label:"Off Track" },
      "":     { bg:"#e7e5e5", text:"#746a6d", border:"#cfcbcc", dot:"#b9b2b4", label:"No Status" },
    };

    const LYFT_OBJS  = ["All", ...Array.from(new Set(FALLBACK.map(r => r.lyftObj)))];
    const PRIORITIES = ["All", ...Array.from(new Set(FALLBACK.map(r => r.priority)))];
    const FUNCS      = ["All", ...Array.from(new Set(FALLBACK.map(r => r.func)))];
    const EPLTS      = ["All", ...Array.from(new Set(FALLBACK.map(r => r.eplt).filter(Boolean))).sort()];
    const PLTS       = ["All", ...Array.from(new Set(FALLBACK.map(r => r.plt).filter(Boolean))).sort()];

    const latestStatus = r => r.q1Feb || r.q1Jan || "";

    function StatusDot({ s, size=8 }) {
      const cfg = STATUS_STYLES[s] || STATUS_STYLES[""];
      return React.createElement("span", { style:{ display:"inline-block", width:size, height:size, borderRadius:"50%", background:cfg.dot, flexShrink:0 } });
    }

    function StatusBadge({ s }) {
      const cfg = STATUS_STYLES[s] || STATUS_STYLES[""];
      return React.createElement("span", { style:{ display:"inline-flex", alignItems:"center", gap:5, padding:"2px 9px", borderRadius:6, fontSize:11, fontWeight:600, background:cfg.bg, color:cfg.text, border:`1px solid ${cfg.border}`, whiteSpace:"nowrap" } },
        React.createElement(StatusDot, { s }),
        cfg.label
      );
    }

    function MonthDot({ s, month }) {
      const cfg = STATUS_STYLES[s] || STATUS_STYLES[""];
      return React.createElement("div", { style:{ display:"flex", flexDirection:"column", alignItems:"center", gap:2 } },
        React.createElement("span", { style:{ display:"inline-block", width:10, height:10, borderRadius:"50%", background:s?cfg.dot:"#e7e5e5", border:`1.5px solid ${s?cfg.dot:"#cfcbcc"}` } }),
        React.createElement("span", { style:{ fontSize:9, color:"#b9b2b4" } }, month)
      );
    }

    function App() {
      const [data, setData] = useState(FALLBACK);
      const [liveStatus, setLiveStatus] = useState("loading");
      const [lastFetched, setLastFetched] = useState(null);
      const [lyftObj, setLyftObj]     = useState("All");
      const [priority, setPriority]   = useState("All");
      const [func, setFunc]           = useState("All");
      const [eplt, setEplt]           = useState("All");
      const [plt, setPlt]             = useState("All");
      const [statusFilter, setStatus] = useState("All");
      const [search, setSearch]       = useState("");
      const [expanded, setExpanded]   = useState(null);
      const [view, setView]           = useState("grouped");

      const doFetch = () => {
        setLiveStatus("loading");
        fetch(APPS_SCRIPT_URL)
          .then(r => r.json())
          .then(json => {
            try {
              const parsed = parseCSV(json.data);
              if (parsed) {
                const mapped = mapCSVToData(parsed);
                if (mapped.length > 0) { setData(mapped); setLiveStatus("live"); }
                else setLiveStatus("fallback");
              } else setLiveStatus("fallback");
            } catch { setLiveStatus("fallback"); }
            setLastFetched(new Date());
          })
          .catch(() => { setLiveStatus("fallback"); setLastFetched(new Date()); });
      };

      useEffect(() => { doFetch(); }, []);

      const filtered = useMemo(() => data.filter(r => {
        const s = latestStatus(r);
        const q = search.toLowerCase();
        return (statusFilter==="All"||s===statusFilter)
          &&(lyftObj==="All"||r.lyftObj===lyftObj)
          &&(priority==="All"||r.priority===priority)
          &&(func==="All"||r.func===func)
          &&(eplt==="All"||r.eplt===eplt)
          &&(plt==="All"||r.plt===plt)
          &&(!q||r.initiative.toLowerCase().includes(q)||r.goal.toLowerCase().includes(q)||r.plt.toLowerCase().includes(q)||r.priority.toLowerCase().includes(q));
      }), [data,lyftObj,priority,func,eplt,plt,statusFilter,search]);

      const counts = useMemo(() => {
        const c={Green:0,Yellow:0,Red:0,"":0};
        data.forEach(r=>{const s=latestStatus(r);c[s]=(c[s]||0)+1;});
        return c;
      }, [data]);

      const grouped = useMemo(() => {
        const g={};
        filtered.forEach(r=>{if(!g[r.priority])g[r.priority]=[];g[r.priority].push(r);});
        return Object.entries(g);
      }, [filtered]);

      const hasFilters = lyftObj!=="All"||priority!=="All"||func!=="All"||eplt!=="All"||plt!=="All"||statusFilter!=="All"||search;
      const clearAll = () => {setLyftObj("All");setPriority("All");setFunc("All");setEplt("All");setPlt("All");setStatus("All");setSearch("");};
      const selStyle = a => ({padding:"7px 14px",borderRadius:8,border:`1.5px solid ${a?"#cf0090":"#cfcbcc"}`,fontSize:12,fontWeight:a?700:500,color:a?"#cf0090":"#5c4d53",background:a?"rgba(207,0,144,0.06)":"#fff",cursor:"pointer"});
      const ss = s => ({padding:"8px 11px",borderRadius:8,border:"1px solid #cfcbcc",fontSize:12,color:"#31222a",background:"#fff",cursor:"pointer"});

      return (
        <div style={{background:"#f1f0ec",minHeight:"100vh"}}>
          <div style={{background:"linear-gradient(135deg,#0f172a 0%,#1e293b 100%)",color:"#fff",padding:"28px 32px 22px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:16}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:"#cf0090"}}/>
                  <span style={{fontSize:10,fontWeight:700,color:"#91888b",letterSpacing:"0.12em",textTransform:"uppercase"}}>Lyft · People Team</span>
                </div>
                <h1 style={{margin:0,fontSize:26,fontWeight:700,letterSpacing:"-0.02em"}}>2026 OKR Tracker</h1>
                <p style={{margin:"4px 0 0",fontSize:13,color:"#91888b",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                  <span style={{display:"inline-flex",alignItems:"center",gap:5}}>
                    <span style={{width:7,height:7,borderRadius:"50%",background:liveStatus==="live"?"#3d7a6b":liveStatus==="fallback"?"#e6a817":"#b9b2b4"}}/>
                    <span>{liveStatus==="live"?"Live from Google Sheets":liveStatus==="fallback"?"Showing cached data":"Connecting..."}</span>
                  </span>
                  {lastFetched&&<span>· {lastFetched.toLocaleTimeString()}</span>}
                  <button onClick={doFetch} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",color:"#b9b2b4",borderRadius:6,padding:"2px 8px",fontSize:11,cursor:"pointer"}}>↻ Refresh</button>
                </p>
              </div>
              <div style={{display:"flex",gap:20,flexWrap:"wrap"}}>
                {[["Green","On Track"],["Yellow","At Risk"],["Red","Off Track"],["","No Status"]].map(([s,label])=>{
                  const cfg=STATUS_STYLES[s];
                  return <div key={s} onClick={()=>setStatus(statusFilter===s?"All":s)} style={{cursor:"pointer",textAlign:"right"}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,justifyContent:"flex-end"}}>
                      <div style={{fontSize:24,fontWeight:700,color:statusFilter===s?cfg.dot:"#fff",lineHeight:1}}>{counts[s]}</div>
                      <StatusDot s={s} size={10}/>
                    </div>
                    <div style={{fontSize:10,color:"#b9b2b4",textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</div>
                  </div>;
                })}
              </div>
            </div>
          </div>

          <div style={{padding:"20px 32px"}}>
            <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search initiatives, owners..."
                style={{flex:"1 1 200px",padding:"8px 13px",borderRadius:8,border:"1px solid #cfcbcc",fontSize:13,color:"#31222a",outline:"none",background:"#fff"}}/>
              <select value={lyftObj} onChange={e=>setLyftObj(e.target.value)} style={ss()}>
                {LYFT_OBJS.map(o=><option key={o} value={o}>{o==="All"?"All Lyft Objectives":o}</option>)}
              </select>
              <select value={priority} onChange={e=>setPriority(e.target.value)} style={ss()}>
                {PRIORITIES.map(p=><option key={p} value={p}>{p==="All"?"All People Priorities":p}</option>)}
              </select>
              <select value={func} onChange={e=>setFunc(e.target.value)} style={ss()}>
                {FUNCS.map(f=><option key={f} value={f}>{f==="All"?"All Functions":f}</option>)}
              </select>
              <select value={eplt} onChange={e=>setEplt(e.target.value)} style={ss()}>
                {EPLTS.map(e=><option key={e} value={e}>{e==="All"?"All EPLT Owners":e}</option>)}
              </select>
              <select value={plt} onChange={e=>setPlt(e.target.value)} style={ss()}>
                {PLTS.map(p=><option key={p} value={p}>{p==="All"?"All PLT Owners":p}</option>)}
              </select>
              {hasFilters&&<button onClick={clearAll} style={{padding:"8px 13px",borderRadius:8,border:"1px solid #cfcbcc",fontSize:12,color:"#746a6d",background:"#fff",cursor:"pointer"}}>Clear</button>}
              <div style={{marginLeft:"auto",display:"flex",gap:6}}>
                <button onClick={()=>setView("grouped")} style={selStyle(view==="grouped")}>Grouped</button>
                <button onClick={()=>setView("table")} style={selStyle(view==="table")}>Table</button>
              </div>
            </div>

            <div style={{fontSize:12,color:"#91888b",marginBottom:14}}>
              Showing <strong style={{color:"#31222a"}}>{filtered.length}</strong> of {data.length} initiatives
            </div>

            {view==="grouped"&&(grouped.length===0
              ?<div style={{textAlign:"center",padding:"48px",color:"#91888b",fontSize:13}}>No initiatives match your filters.</div>
              :grouped.map(([grp,rows],gi)=>{
                const isOpen=expanded===null||expanded===gi;
                const grpStatuses=rows.map(r=>latestStatus(r));
                const dominant=["Red","Yellow","Green",""].find(s=>grpStatuses.includes(s))||"";
                return <div key={gi} style={{marginBottom:12,background:"#fff",borderRadius:12,border:"1px solid #e7e5e5",overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
                  <div onClick={()=>setExpanded(expanded===gi?null:gi)}
                    style={{padding:"13px 20px",display:"flex",alignItems:"center",gap:12,cursor:"pointer",borderBottom:isOpen?"1px solid #e7e5e5":"none"}}
                    onMouseEnter={e=>e.currentTarget.style.background="rgba(207,0,144,0.04)"}
                    onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                    <span style={{fontSize:12,color:"#b9b2b4",minWidth:14}}>{isOpen?"▾":"▸"}</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,fontWeight:700,color:"#1d0c17"}}>{grp}</div>
                      <div style={{fontSize:11,color:"#91888b",marginTop:2}}>{rows.length} initiative{rows.length!==1?"s":""}</div>
                    </div>
                    <div style={{display:"flex",gap:5}}>{grpStatuses.map((s,i)=><StatusDot key={i} s={s} size={8}/>)}</div>
                    <StatusBadge s={dominant}/>
                  </div>
                  {isOpen&&rows.map((r,ri)=>{
                    const s=latestStatus(r);
                    const isHold=r.initiative.toLowerCase().includes("on hold");
                    const cfg=STATUS_STYLES[s]||STATUS_STYLES[""];
                    return <div key={ri} style={{padding:"13px 20px 13px 46px",borderBottom:ri<rows.length-1?"1px solid #f1f0ec":"none",background:isHold?"#fafaf9":"#fff"}}>
                      <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:12,alignItems:"start"}}>
                        <div>
                          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                            {isHold&&<span style={{fontSize:10,fontWeight:700,color:"#91888b",background:"#e7e5e5",padding:"1px 7px",borderRadius:4,border:"1px solid #cfcbcc"}}>ON HOLD</span>}
                            <span style={{fontSize:13,fontWeight:600,color:isHold?"#91888b":"#1d0c17"}}>{r.initiative.replace(/^ON HOLD:\s*/i,"")}</span>
                          </div>
                          <div style={{fontSize:11,color:"#91888b",marginBottom:6}}>{r.goal}</div>
                          <div style={{display:"flex",flexWrap:"wrap",gap:6,alignItems:"center",marginBottom:r.q1Note?7:0}}>
                            <span style={{fontSize:11,color:"#746a6d",background:"#f1f0ec",padding:"2px 8px",borderRadius:5}}>👤 PLT: {r.plt}</span>
                            <span style={{fontSize:11,color:"#746a6d",background:"#f1f0ec",padding:"2px 8px",borderRadius:5}}>EPLT: {r.eplt}</span>
                            <span style={{fontSize:11,color:"#746a6d",background:"#f1f0ec",padding:"2px 8px",borderRadius:5}}>{r.func}</span>
                          </div>
                          {r.q1Note&&<div style={{fontSize:11,color:"#5c4d53",background:"#f9f8f7",border:`1px solid ${cfg.border}`,borderRadius:7,padding:"7px 10px",lineHeight:1.5}}>
                            <span style={{fontWeight:700,color:cfg.text}}>Latest: </span>{r.q1Note}
                          </div>}
                        </div>
                        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:8,minWidth:120}}>
                          <StatusBadge s={s}/>
                          <div style={{display:"flex",gap:8}}>
                            <MonthDot s={r.q1Jan} month="Jan"/>
                            <MonthDot s={r.q1Feb} month="Feb"/>
                            <MonthDot s={r.q1Mar} month="Mar"/>
                          </div>
                        </div>
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginTop:10}}>
                        {[["Q1",r.q1KR],["Q2",r.q2KR],["Q3",r.q3KR],["Q4",r.q4KR]].map(([q,kr])=>kr
                          ?<div key={q} style={{background:"#f9f8f7",borderRadius:7,padding:"7px 9px",border:"1px solid #e7e5e5"}}>
                            <div style={{fontSize:10,fontWeight:700,color:"#cf0090",marginBottom:3}}>{q}</div>
                            <div style={{fontSize:11,color:"#5c4d53",lineHeight:1.4}}>{kr}</div>
                          </div>:null
                        )}
                      </div>
                    </div>;
                  })}
                </div>;
              })
            )}

            {view==="table"&&<div style={{background:"#fff",borderRadius:12,border:"1px solid #b9b2b4",overflow:"hidden"}}>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",minWidth:1000}}>
                  <thead>
                    <tr style={{background:"#e7e5e5"}}>
                      {["People Priority","Initiative","Function","PLT Owner","EPLT Owner","Status","Jan","Feb","Q1 Key Result"].map(h=>
                        <th key={h} style={{fontSize:11,fontWeight:700,color:"#1d0c17",textTransform:"uppercase",letterSpacing:"0.05em",padding:"9px 13px",textAlign:"left",borderBottom:"1px solid #b9b2b4",whiteSpace:"nowrap"}}>{h}</th>
                      )}
                    </tr>
                  </thead>
                  <tbody>
                    {filtered.length===0
                      ?<tr><td colSpan={9} style={{padding:"48px",textAlign:"center",color:"#91888b",fontSize:13}}>No initiatives match your filters.</td></tr>
                      :filtered.map((r,i)=>{
                        const s=latestStatus(r);
                        const isHold=r.initiative.toLowerCase().includes("on hold");
                        return <tr key={i} style={{background:i%2===0?"#fff":"#f9f8f7"}}
                          onMouseEnter={e=>e.currentTarget.style.background="rgba(207,0,144,0.04)"}
                          onMouseLeave={e=>e.currentTarget.style.background=i%2===0?"#fff":"#f9f8f7"}>
                          <td style={{padding:"9px 13px",fontSize:12,fontWeight:600,color:"#4a6fa5",borderBottom:"1px solid #e7e5e5",whiteSpace:"nowrap"}}>{r.priority}</td>
                          <td style={{padding:"9px 13px",fontSize:12,color:isHold?"#91888b":"#1d0c17",borderBottom:"1px solid #e7e5e5",maxWidth:220,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={r.initiative}>
                            {isHold&&<span style={{fontSize:9,fontWeight:700,color:"#91888b",background:"#e7e5e5",padding:"1px 5px",borderRadius:3,marginRight:5}}>HOLD</span>}
                            {r.initiative.replace(/^ON HOLD:\s*/i,"")}
                          </td>
                          <td style={{padding:"9px 13px",fontSize:11,color:"#746a6d",borderBottom:"1px solid #e7e5e5",whiteSpace:"nowrap"}}>{r.func}</td>
                          <td style={{padding:"9px 13px",fontSize:11,color:"#746a6d",borderBottom:"1px solid #e7e5e5",whiteSpace:"nowrap"}}>{r.plt}</td>
                          <td style={{padding:"9px 13px",fontSize:11,color:"#746a6d",borderBottom:"1px solid #e7e5e5",whiteSpace:"nowrap"}}>{r.eplt}</td>
                          <td style={{padding:"9px 13px",borderBottom:"1px solid #e7e5e5",whiteSpace:"nowrap"}}><StatusBadge s={s}/></td>
                          <td style={{padding:"9px 13px",borderBottom:"1px solid #e7e5e5",textAlign:"center"}}><StatusDot s={r.q1Jan} size={10}/></td>
                          <td style={{padding:"9px 13px",borderBottom:"1px solid #e7e5e5",textAlign:"center"}}><StatusDot s={r.q1Feb} size={10}/></td>
                          <td style={{padding:"9px 13px",fontSize:11,color:"#5c4d53",borderBottom:"1px solid #e7e5e5",maxWidth:260,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={r.q1KR}>{r.q1KR}</td>
                        </tr>;
                      })
                    }
                  </tbody>
                </table>
              </div>
            </div>}

            <div style={{marginTop:12,fontSize:11,color:"#b9b2b4",textAlign:"right"}}>
              Source: People Team Annual Plan 2026 · Owner: Erin Ashton
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(React.createElement(App), document.getElementById("root"));
  </script>
</body>
</html>
